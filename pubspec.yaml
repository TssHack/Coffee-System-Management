name: coffee
description: اتوماسیون هوشمند سفارش کافه
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  go_router: ^13.0.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.1
  iconsax: ^0.0.8
  fl_chart: ^0.66.0
  socket_io_client: ^2.0.3+1
  intl: ^0.19.0
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Light.woff2
          weight: 300
        - asset: assets/fonts/Vazirmatn-Regular.woff2
          weight: 400
        - asset: assets/fonts/Vazirmatn-Medium.woff2
          weight: 500
        - asset: assets/fonts/Vazirmatn-SemiBold.woff2
          weight: 600
        - asset: assets/fonts/Vazirmatn-Bold.woff2
          weight: 700
        - asset: assets/fonts/Vazirmatn-ExtraBold.woff2
          weight: 800
        - asset: assets/fonts/Vazirmatn-Black.woff2
          weight: 900